name: einvoice-provider

services:
  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - einvoice-new
    volumes:
      - ./docker/docker_data/monogdb_data:/data/db
    restart: unless-stopped
  
  postgres:
    image: postgres:14
    container_name: postgres_server
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=einvoice-app
    networks:
      - einvoice-new
    volumes:
      - ./docker/docker_data/postgres_data:/var/postgresql/data
  
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    container_name: keycloak-25.0.0
    ports:
      - '8180:8080'
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    restart: unless-stopped
    volumes:
      - ./docker/docker_data/keycloak_data:/opt/keycloak/data
    networks:
      - einvoice-new
  
  redis:
    image: redis
    container_name: redis_server
    ports:
      - '6379:6379'
    networks:
      - einvoice-new
    restart: unless-stopped
    volumes:
      - ./docker/docker_data/redis_data:/data

networks:
  einvoice-new:
    driver: bridge
    name: einvoice-new